# =============================================================================
# SCORE Coaching — Prometheus Configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # --- Prometheus self-monitoring ---
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # --- Node Exporter (хост: CPU, RAM, диск, сеть) ---
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # --- PostgreSQL Exporter ---
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # --- Nginx (stub_status — потребует включения модуля) ---
  # - job_name: 'nginx'
