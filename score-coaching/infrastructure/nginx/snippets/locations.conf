# =============================================================================
# Общие locations для проксирования к Supabase-сервисам
# =============================================================================

# --- Главная страница / SPA ---
location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
}

# --- PostgREST (REST API) ---
location /rest/v1/ {
    limit_req zone=api_limit burst=60 nodelay;
    rewrite ^/rest/v1/(.*) /$1 break;
    proxy_pass http://postgrest;
    include /etc/nginx/snippets/proxy-params.conf;
}

# --- GoTrue (Auth) ---
location /auth/v1/ {
    limit_req zone=auth_limit burst=10 nodelay;
    rewrite ^/auth/v1/(.*) /$1 break;
    proxy_pass http://gotrue;
    include /etc/nginx/snippets/proxy-params.conf;
}

# --- Realtime (WebSocket) ---
location /realtime/v1/ {
    rewrite ^/realtime/v1/(.*) /$1 break;
    proxy_pass http://realtime;
    include /etc/nginx/snippets/websocket-params.conf;
}

# --- Storage ---
location /storage/v1/ {
    rewrite ^/storage/v1/(.*) /$1 break;
    proxy_pass http://storage;
    include /etc/nginx/snippets/proxy-params.conf;
    client_max_body_size 500m;
}

# --- Studio (админ, опционально) ---
location /studio/ {
    # Ограничение доступа — раскомментировать:
    # allow 127.0.0.1;
    # deny all;
    rewrite ^/studio/(.*) /$1 break;
    proxy_pass http://studio;
    include /etc/nginx/snippets/proxy-params.conf;
}

# --- Grafana ---
location /grafana/ {
    # allow 127.0.0.1;
    # deny all;
    rewrite ^/grafana/(.*) /$1 break;
    proxy_pass http://grafana;
    include /etc/nginx/snippets/proxy-params.conf;
}

# --- Health check ---
location /health {
    access_log off;
    return 200 '{"status":"ok"}';
    add_header Content-Type application/json;
}
