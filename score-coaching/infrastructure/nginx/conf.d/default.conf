# =============================================================================
# SCORE Coaching — Virtual Hosts
# =============================================================================
# На старте используем HTTP. После получения сертификата — переключаемся на HTTPS.
# Команда для получения сертификата:
#   docker compose run --rm certbot certonly --webroot \
#     -w /var/www/certbot \
#     -d score-coaching.ru -d api.score-coaching.ru \
#     -d storage.score-coaching.ru -d monitoring.score-coaching.ru \
#     --email admin@score-coaching.ru --agree-tos --no-eff-email
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect (включить после получения TLS-сертификата)
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Раскомментировать после получения сертификата:
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # Временно (до TLS) — проксировать напрямую
    include /etc/nginx/snippets/locations.conf;
}

