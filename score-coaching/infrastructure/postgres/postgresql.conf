# =============================================================================
# PostgreSQL 15 — Оптимизация для SCORE Coaching
# =============================================================================
# ПРОФИЛЬ: 4 vCPU / 16GB RAM / 200GB NVMe SSD (~100 пользователей)
# Провайдер: Selectel Cloud (Москва)
#
# Как масштабировать (поменяй числа и сделай docker compose restart postgres):
#   8vCPU/32GB:  shared_buffers=8GB, work_mem=32MB, maintenance=2GB,
#                effective_cache_size=24GB, max_parallel_workers=8,
#                max_wal_size=4GB, wal_buffers=64MB, autovacuum_max_workers=4
# =============================================================================

# ---------------------------------------------------------------------------
# Подключения (pgBouncer управляет пулом, прямых подключений немного)
# ---------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 100
superuser_reserved_connections = 3

# ---------------------------------------------------------------------------
# Память (расчёт для 16GB RAM)
# ---------------------------------------------------------------------------
# shared_buffers: ~25% от 16GB RAM
shared_buffers = 4GB

# work_mem: для сортировок и хешей в каждом запросе
# 100 connections * 2 * 16MB = 3.2GB — безопасно для 16GB
work_mem = 16MB

# Для операций обслуживания (VACUUM, CREATE INDEX)
maintenance_work_mem = 1GB

# effective_cache_size: сколько ОС кэширует (~75% RAM)
effective_cache_size = 12GB

# Буферы WAL
wal_buffers = 32MB

# Huge pages (включить если ОС поддерживает)
huge_pages = try

# ---------------------------------------------------------------------------
# WAL и надёжность
# ---------------------------------------------------------------------------
wal_level = replica
max_wal_size = 2GB
min_wal_size = 512MB
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9

# Синхронный коммит — максимальная надёжность данных
synchronous_commit = on

# ---------------------------------------------------------------------------
# Планировщик запросов
# ---------------------------------------------------------------------------
random_page_cost = 1.1        # NVMe SSD — почти как sequential
effective_io_concurrency = 200 # NVMe SSD
default_statistics_target = 200

# ---------------------------------------------------------------------------
# Параллельные запросы (4 vCPU)
# ---------------------------------------------------------------------------
max_worker_processes = 4
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# ---------------------------------------------------------------------------
# Логирование (для отладки медленных запросов)
# ---------------------------------------------------------------------------
logging_collector = on
log_directory = '/var/log/postgresql'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 300    # Логировать запросы > 300ms
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0

# ---------------------------------------------------------------------------
# Autovacuum
# ---------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.02

# ---------------------------------------------------------------------------
# Локализация
# ---------------------------------------------------------------------------
# ВАЖНО: supabase/postgres (Ubuntu) может не иметь ru_RU.utf8 из коробки.
# Если нужна русская локаль — добавь в Dockerfile или entrypoint:
#   locale-gen ru_RU.UTF-8 && update-locale
# После этого раскомментируй строки ниже:
#   lc_monetary = 'ru_RU.utf8'
#   lc_numeric  = 'ru_RU.utf8'
#   lc_time     = 'ru_RU.utf8'
lc_messages = 'en_US.utf8'
lc_monetary = 'C.UTF-8'
lc_numeric = 'C.UTF-8'
lc_time = 'C.UTF-8'
timezone = 'Europe/Moscow'
